services:
  tool-stack:
    image: tool-stack:ssr
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    init: true
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DOMAIN: ${DOMAIN:-https://toolstack.juvvv.com}
    mem_limit: 512m
    cpus: 1.0
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    stop_grace_period: 10s

