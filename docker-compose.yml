services:
  tool-stack:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tool-stack
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    # 可选：使用环境变量文件
    # env_file:
    #   - .env
    # 可选：持久化日志
    # volumes:
    #   - ./logs:/app/logs
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    # 健康检查
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 可选：使用 Nginx 作为反向代理
  # nginx:
