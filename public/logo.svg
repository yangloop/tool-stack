<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- 背景圆角矩形 -->
  <rect x="5" y="5" width="90" height="90" rx="20" fill="url(#gradient)"/>
  
  <!-- 工具箱主体 -->
  <rect x="20" y="35" width="60" height="45" rx="6" fill="white" fill-opacity="0.95"/>
  
  <!-- 工具箱提手 -->
  <path d="M35 35V28C35 24.686 37.686 22 41 22H59C62.314 22 65 24.686 65 28V35" stroke="white" stroke-width="6" stroke-linecap="round"/>
  
  <!-- 锁扣 -->
  <rect x="42" y="42" width="16" height="12" rx="2" fill="url(#gradient)"/>
  <circle cx="50" cy="48" r="3" fill="white"/>
  
  <!-- 工具图标：扳手 -->
  <path d="M28 65L32 61L36 65L32 69L28 65Z" fill="#6366F1"/>
  <path d="M64 61L68 65L64 69L60 65L64 61Z" fill="#6366F1"/>
  
  <!-- 渐变定义 -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>
</svg>
