<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - ToolStack</title>
  <link rel="icon" href="/favicon.ico">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8fafc;color:#1e293b;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
    .wrap{text-align:center}
    h1{font-size:6rem;font-weight:700;color:#0ea5e9;line-height:1}
    p{margin:16px 0 24px;color:#64748b}
    a{display:inline-block;padding:10px 24px;background:#0ea5e9;color:#fff;text-decoration:none;border-radius:8px;font-size:14px}
    a:hover{background:#0284c7}
    @media(prefers-color-scheme:dark){body{background:#0f172a;color:#e2e8f0}p{color:#94a3b8}}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>404</h1>
    <p>页面未找到</p>
    <a href="/">返回首页</a>
  </div>
</body>
</html>
