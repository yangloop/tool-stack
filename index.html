<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToolStack</title>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;padding:0;min-height:100vh}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}
    
    /* 加载遮罩 - 覆盖整个页面 */
    #loader{position:fixed;inset:0;z-index:2147483647;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f8fafc;transition:opacity .15s ease-out}
    .dark #loader{background:#0f172a}
    #loader.hidden{opacity:0;visibility:hidden;pointer-events:none}
    #loader .spinner{width:48px;height:48px;border:3px solid #e2e8f0;border-top-color:#6366f1;border-radius:50%;animation:spin 1s linear infinite}
    .dark #loader .spinner{border-color:#334155;border-top-color:#6366f1}
    @keyframes spin{to{transform:rotate(360deg)}}
    #loader .text{margin-top:16px;color:#64748b;font-size:14px}
    .dark #loader .text{color:#94a3b8}
    
    /* 内容区域 - 初始完全隐藏 */
    #root{opacity:0;visibility:hidden}
    #root.hydrated{opacity:1;visibility:visible;transition:opacity .15s ease-out}
    
    /* 兜底：万一JS失败，3秒后强制显示 */
    @media (prefers-reduced-motion:no-preference){
      body:not(.js-loaded) #root{animation:forceShow 3s forwards}
      @keyframes forceShow{0%,99%{opacity:0}100%{opacity:1;visibility:visible}}
    }
  </style>
  <script type="module">
    import RefreshRuntime from "/@react-refresh"
    RefreshRuntime.injectIntoGlobalHook(window)
    window.$RefreshReg$ = () => {}
    window.$RefreshSig$ = () => (type) => type
    window.__vite_plugin_react_preamble_installed__ = true
  </script>
</head>
<body>
  <div id="loader">
    <div class="spinner"></div>
    <div class="text">加载中...</div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/entry-client.tsx"></script>
  <script>
    (function(){
      const saved=localStorage.getItem('theme-dark');
      const prefers=window.matchMedia('(prefers-color-scheme:dark)').matches;
      if(saved==='true'||(!saved&&prefers))document.documentElement.classList.add('dark');
      document.body.classList.add('js-loaded');
    })();
  </script>
</body>
</html>
